name: Agente Autónomo con Gemini

on:
  push:
    paths:
      - 'PROMPT.md'
  workflow_dispatch:            # Te permite ejecutarlo manualmente con un botón desde la web de GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Instalar SDK de Gemini
      run: pip install google-genai

    - name: Invocar a Gemini para reescribir el código
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python agente.py

    - name: Probar el nuevo código generado
      run: python ruleta.py

    - name: Auto-guardar cambios en el repositorio si la prueba pasa
      if: success()
      run: |
        git config --global user.name "Gemini Agent"
        git config --global user.email "agent@gemini.ai"
        git add ruleta.py
        
        # Evitamos que falle si por algún motivo no hubiera cambios reales que commitear
        git diff-index --quiet HEAD || git commit -m "🤖 Refactor automático por Gemini basado en PROMPT.md"
        
        # Sincronizamos los commits remotos trayéndolos "detrás" de lo que ha hecho la IA
        git pull --rebase origin main
        
        # Empujamos de forma segura usando el token de autenticación del propio flujo
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main

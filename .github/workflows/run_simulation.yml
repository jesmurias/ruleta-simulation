name: Agente Autónomo con Gemini

on:
  push:
    paths:
      - 'PROMPT.md'
  workflow_dispatch:            # Te permite ejecutarlo manualmente con un botón desde la web de GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Al descargar el repositorio, le añadimos 'persist-credentials: false'
    - name: Descargar el repositorio
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Configurar Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Instalar SDK de Gemini
      run: pip install google-genai

    - name: Invocar a Gemini para reescribir el código
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python agente.py

    - name: Probar el nuevo código generado
      run: python ruleta.py

    # 2. El paso de auto-guardar simplificado y usando autenticación limpia por URL
    - name: Auto-guardar cambios en el repositorio si la prueba pasa
      if: success()
      run: |
        git config --global user.name "Gemini Agent"
        git config --global user.email "agent@gemini.ai"

        # Añadimos los cambios de ruleta.py
        git add ruleta.py

        # Hacemos el commit si hay algo nuevo
        git diff-index --quiet HEAD || git commit -m "🤖 Refactor automático por Gemini basado en PROMPT.md"

        # Al haber desactivado persist-credentials, esta URL con el GITHUB_TOKEN
        # tiene permiso absoluto para forzar la subida saltándose el bloqueo de refs
        git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main
